<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - DeskFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; }
        .container { max-width: 600px; margin: 5rem auto; padding: 0 1rem; text-align: center; }
        .card { background: #fff; border-radius: 8px; padding: 3rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 1rem; color: #16a34a; }
        p { margin-bottom: 0.75rem; font-size: 1.1rem; }
        .ticket-number { font-size: 1.5rem; font-weight: bold; color: #2563eb; margin: 1rem 0; }
        .footer { text-align: center; padding: 2rem; color: #888; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Thank You!</h1>
            <p>Your request has been submitted successfully.</p>
            {% if ticket_number %}
            <div class="ticket-number">Ticket #{{ ticket_number }}</div>
            <p>Please save this number for your reference.</p>
            {% endif %}
        </div>
    </div>
    <div class="footer">Powered by DeskFlow</div>
</body>
</html>
