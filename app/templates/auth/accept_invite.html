{% extends "base.html" %}
{% block title %}Accept Invitation - {{ request.app.state.app_name|default('DeskFlow') }}{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
    <h1 style="text-align:center;">Welcome to {{ request.app.state.app_name|default('DeskFlow') }}</h1>
    <p style="text-align:center;color:#666;">Set up your account for <strong>{{ invitation.email }}</strong></p>

    <div class="card">
        <form method="post" action="/auth/invite/{{ token }}">
            <div class="form-group">
                <label for="display_name">Display Name</label>
                <input type="text" id="display_name" name="display_name" required placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
