<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - {{ request.app.state.app_name|default('DeskFlow') }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .widget { max-width: 400px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.15); }
        .widget-header { background: #2563eb; color: #fff; padding: 1rem; font-weight: bold; font-size: 1.1rem; }
        .widget-body { flex: 1; display: flex; flex-direction: column; }
        .start-form { padding: 1.5rem; }
        .start-form h2 { margin-bottom: 1rem; font-size: 1.1rem; }
        .start-form label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; font-weight: 500; }
        .start-form input { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 0.75rem; font-size: 0.95rem; }
        .start-form button { width: 100%; padding: 0.75rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .chat-area { flex: 1; display: none; flex-direction: column; }
        .chat-area.active { display: flex; }
        .messages { flex: 1; overflow-y: auto; padding: 1rem; }
        .msg { margin-bottom: 0.75rem; max-width: 80%; }
        .msg.customer { margin-left: auto; }
        .msg .bubble { padding: 0.5rem 0.75rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; }
        .msg.agent .bubble { background: #e5e7eb; }
        .msg.customer .bubble { background: #2563eb; color: #fff; }
        .msg .name { font-size: 0.75rem; color: #888; margin-bottom: 2px; }
        .input-bar { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid #eee; }
        .input-bar input { flex: 1; padding: 0.6rem; border: 1px solid #ddd; border-radius: 20px; font-size: 0.95rem; }
        .input-bar button { padding: 0.6rem 1rem; background: #2563eb; color: #fff; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="widget">
        <div class="widget-header">{{ request.app.state.app_name|default('DeskFlow') }} Chat</div>
        <div class="widget-body">
            <div class="start-form" id="startForm">
                <h2>Start a conversation</h2>
                <label for="wName">Name</label>
                <input type="text" id="wName" placeholder="Your name" required>
                <label for="wEmail">Email</label>
                <input type="email" id="wEmail" placeholder="Your email" required>
                <button id="startBtn">Start Chat</button>
            </div>
            <div class="chat-area" id="chatArea">
                <div class="messages" id="messages"></div>
                <div class="input-bar">
                    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>
    <script>
    (function() {
        var ws, sessionId;
        var startForm = document.getElementById('startForm');
        var chatArea = document.getElementById('chatArea');
        var messagesDiv = document.getElementById('messages');
        var msgInput = document.getElementById('msgInput');

        document.getElementById('startBtn').addEventListener('click', function() {
            var name = document.getElementById('wName').value.trim();
            var email = document.getElementById('wEmail').value.trim();
            if (!name || !email) return;

            fetch('/chat/widget/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, email: email})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                sessionId = data.session_id;
                startForm.style.display = 'none';
                chatArea.classList.add('active');
                connectWS();
            });
        });

        function connectWS() {
            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(proto + '//' + location.host + '/chat/ws/' + sessionId);
            ws.onmessage = function(e) {
                var data = JSON.parse(e.data);
                addMessage(data.body, data.sender_type || 'agent', data.sender_name);
            };
        }

        function addMessage(text, type, name) {
            var div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = (name ? '<div class="name">' + name + '</div>' : '') +
                '<div class="bubble">' + text + '</div>';
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function send() {
            var text = msgInput.value.trim();
            if (!text || !ws) return;
            ws.send(JSON.stringify({body: text}));
            addMessage(text, 'customer', 'You');
            msgInput.value = '';
        }

        document.getElementById('sendBtn').addEventListener('click', send);
        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') send();
        });
    })();
    </script>
</body>
</html>
