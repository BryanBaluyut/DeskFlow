{% extends "base.html" %}
{% block title %}Triggers - Admin - DeskFlow{% endblock %}
{% block content %}
<h1>Triggers</h1>

<div class="card">
    <table class="ticket-table">
        <thead>
            <tr><th>Name</th><th>Event</th><th>Active</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for t in triggers|default([]) %}
            <tr>
                <td>{{ t.name }}</td>
                <td>{{ t.event }}</td>
                <td>
                    <form method="post" action="/admin/triggers/{{ t.id }}/toggle" class="inline-form">
                        <button type="submit" class="btn btn-small">{{ 'Yes' if t.active else 'No' }}</button>
                    </form>
                </td>
                <td>
                    <form method="post" action="/admin/triggers/{{ t.id }}/delete" class="inline-form">
                        <button type="submit" class="btn btn-small">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="card">
    <h2>Add New Trigger</h2>
    <form method="post" action="/admin/triggers">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Event</label>
            <select name="event">
                <option value="ticket.create">ticket.create</option>
                <option value="ticket.update">ticket.update</option>
                <option value="ticket.close">ticket.close</option>
                <option value="article.create">article.create</option>
            </select>
        </div>
        <div class="form-group">
            <label>Conditions (JSON)</label>
            <textarea name="conditions" rows="4" placeholder='{"field": "value"}'></textarea>
        </div>
        <div class="form-group">
            <label>Actions (JSON)</label>
            <textarea name="actions" rows="4" placeholder='[{"action": "set", "field": "priority", "value": "high"}]'></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Create Trigger</button>
    </form>
</div>
{% endblock %}
