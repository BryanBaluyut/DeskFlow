name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: pytest tests/ -v
    env:
      SECRET_KEY: test-secret-key
      DATABASE_URL: sqlite+aiosqlite:///test.db
      ENTRA_CLIENT_ID: test
      ENTRA_CLIENT_SECRET: test
      ENTRA_TENANT_ID: test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t slatedesk:test .
